<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic 3D Solar Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle, #050505 0%, #000 100%); font-family: 'Segoe UI', sans-serif; }
        #video_container { position: absolute; bottom: 20px; right: 20px; width: 180px; border-radius: 15px; border: 2px solid #333; transform: scaleX(-1); z-index: 10; }
        video { width: 100%; display: block; border-radius: 13px; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; border-left: 5px solid #ffaa00; pointer-events: none; z-index: 10; }
        .planet { color: #ffaa00; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <h2 style="margin:0 0 10px 0; color:white;">Solar Architect v2</h2>
    <p><span class="planet">[Kepal]</span> Matahari (Plasma)</p>
    <p><span class="planet">[1 Jari]</span> Bumi (Biru/Hijau)</p>
    <p><span class="planet">[2 Jari]</span> Mars (Merah Karat)</p>
    <p><span class="planet">[3 Jari]</span> Saturnus (Tan/Emas)</p>
    <p style="font-size:12px; color:#888;">Putar tangan untuk zoom</p>
</div>

<div id="video_container">
    <video id="input_video"></video>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<script>
// --- 1. SETTINGS & SCENE ---
const particleCount = 150000;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 25;

// --- 2. DATA STRUCTURES ---
const geometry = new THREE.BufferGeometry();
const posArray = new Float32Array(particleCount * 3);
const colArray = new Float32Array(particleCount * 3); // Current Colors Buffer

// Shapes and Colors data
const data = {
    sun: { pos: new Float32Array(particleCount * 3), col: new Float32Array(particleCount * 3) },
    earth: { pos: new Float32Array(particleCount * 3), col: new Float32Array(particleCount * 3) },
    mars: { pos: new Float32Array(particleCount * 3), col: new Float32Array(particleCount * 3) },
    saturn: { pos: new Float32Array(particleCount * 3), col: new Float32Array(particleCount * 3) }
};

// Generator Bola Parametrik
function createSphereData(target, radius, type) {
    for (let i = 0; i < particleCount; i++) {
        const idx = i * 3;
        const phi = Math.acos(-1 + (2 * i) / particleCount);
        const theta = Math.sqrt(particleCount * Math.PI) * phi;
        
        const x = radius * Math.cos(theta) * Math.sin(phi);
        const y = radius * Math.sin(theta) * Math.sin(phi);
        const z = radius * Math.cos(phi);
        target.pos[idx] = x; target.pos[idx+1] = y; target.pos[idx+2] = z;

        const c = new THREE.Color();
        
        if (type === 'sun') {
            // MATAHARI: Plasma Oranye terang ke Kuning
            c.setHex(0xffaa00);
            const n = Math.sin(theta * 10) * Math.cos(phi * 10);
            if (n > 0.3) c.setHex(0xffff00); // Bintik kuning cerah
        } else if (type === 'earth') {
            // BUMI: Realistis (Biru Laut, Hijau Benua, Putih Kutub)
            // Noise Term untuk simulasi geografi
            const n = Math.sin(x*0.5)*Math.cos(y*0.5) + Math.sin(z*1.2);
            if (Math.abs(y) > radius * 0.85) c.setHex(0xffffff); // Kutub Putih
            else if (n > 0.15) c.setHex(0x228b22); // Benua Hijau
            else if (n > 0.05) c.setHex(0x32cd32); // Pantai Hijau Muda
            else c.setHex(0x0a2a4a); // Laut Biru Tua
        } else if (type === 'mars') {
            // MARS: Merah Karat, Merah Tua, Cokelat
            const n = Math.sin(theta * 5) * Math.cos(phi * 8);
            if (n > 0.2) c.setHex(0x8b4513); // Cokelat Tanah
            else if (n > -0.2) c.setHex(0xc24022); // Merah Karat Utama
            else c.setHex(0xa52a2a); // Merah Marun Tua
        }
        target.col[idx] = c.r; target.col[idx+1] = c.g; target.col[idx+2] = c.b;
    }
}

// Init Shapes
createSphereData(data.sun, 8, 'sun');
createSphereData(data.earth, 6.5, 'earth');
createSphereData(data.mars, 5.5, 'mars');

// Saturn Khusus (Inti + Cincin)
for (let i = 0; i < particleCount; i++) {
    const idx = i * 3;
    const c = new THREE.Color();
    if (i < particleCount * 0.45) { // Saturn Core
        const phi = Math.acos(-1 + (2 * i) / (particleCount * 0.45));
        const theta = Math.sqrt(particleCount * 0.45 * Math.PI) * phi;
        data.saturn.pos[idx] = 4 * Math.cos(theta) * Math.sin(phi);
        data.saturn.pos[idx+1] = 4 * Math.sin(theta) * Math.sin(phi);
        data.saturn.pos[idx+2] = 4 * Math.cos(phi);
        c.setHex(0xd2b48c); // Krem (Tan)
    } else { // Saturn Rings
        const r = 6 + Math.random() * 4.5;
        const a = Math.random() * Math.PI * 2;
        data.saturn.pos[idx] = Math.cos(a) * r;
        data.saturn.pos[idx+1] = (Math.random() - 0.5) * 0.2;
        data.saturn.pos[idx+2] = Math.sin(a) * r;
        c.setHex(0xeee8aa); // Emas Pucat cerah
    }
    data.saturn.col[idx] = c.r; data.saturnCol = c.g; data.saturn.col[idx+2] = c.b;
}

// Initial State (Sun)
for(let i=0; i<particleCount*3; i++) { posArray[i] = data.sun.pos[i]; colArray[i] = data.sun.col[i]; }
geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colArray, 3));

// Material: AdditiveBlending membuat warna tumpang tindih lebih bercahaya
const material = new THREE.PointsMaterial({ size: 0.045, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false });
const points = new THREE.Points(geometry, material);
scene.add(points);

// --- 3. HAND TRACKING ---
let currentTarget = data.sun;
let handScale = 1;

const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7 });

hands.onResults((res) => {
    if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        const pts = res.multiHandLandmarks[0];
        points.position.x = THREE.MathUtils.lerp(points.position.x, (pts[9].x - 0.5) * -40, 0.1);
        points.position.y = THREE.MathUtils.lerp(points.position.y, (pts[9].y - 0.5) * -30, 0.1);

        // Zoom based on tilt (wrist rotation)
        const dx = pts[9].x - pts[0].x; const dy = pts[9].y - pts[0].y;
        const tilt = Math.abs(Math.atan2(dy, dx) + Math.PI/2);
        handScale = THREE.MathUtils.lerp(handScale, 1.0 + tilt * 2.8, 0.1);

        // Detect fingers for target shape
        const iU = pts[8].y < pts[6].y - 0.05;
        const mU = pts[12].y < pts[10].y - 0.05;
        const rU = pts[16].y < pts[14].y - 0.05;

        if (iU && mU && rU) currentTarget = data.saturn;
        else if (iU && mU) currentTarget = data.mars;
        else if (iU) currentTarget = data.earth;
        else currentTarget = data.sun;
    }
});

new Camera(document.getElementById('input_video'), {
    onFrame: async () => { await hands.send({image: document.getElementById('input_video')}); },
    width: 640, height: 480
}).start();

// --- 4. ANIMATION & MORPH LOOP ---
function animate() {
    requestAnimationFrame(animate);
    const pos = geometry.attributes.position.array;
    const col = geometry.attributes.color.array;

    for (let i = 0; i < particleCount; i++) {
        const idx = i * 3;
        // Position Morph (Smooth)
        pos[idx] += (currentTarget.pos[idx] - pos[idx]) * 0.1;
        pos[idx+1] += (currentTarget.pos[idx+1] - pos[idx+1]) * 0.1;
        pos[idx+2] += (currentTarget.pos[idx+2] - pos[idx+2]) * 0.1;

        // Color Morph (Smooth) - NEW LOGIC
        col[idx] += (currentTarget.col[idx] - col[idx]) * 0.1;
        col[idx+1] += (currentTarget.col[idx+1] - col[idx+1]) * 0.1;
        col[idx+2] += (currentTarget.col[idx+2] - col[idx+2]) * 0.1;
    }
    
    geometry.attributes.position.needsUpdate = true;
    geometry.attributes.color.needsUpdate = true;
    points.scale.setScalar(handScale);
    points.rotation.y += 0.005;
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
